<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduCoin 2.0 | Study Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#fcf8fe",
                        "secondary-dim": "#46eae5",
                        "primary": "#aca3ff",
                        "tertiary-fixed-dim": "#efc117",
                        "primary-container": "#9e93ff",
                        "on-tertiary": "#644f00",
                        "secondary": "#5af9f3",
                        "tertiary-dim": "#efc117",
                        "inverse-primary": "#5948d3",
                        "on-primary-container": "#1d007a",
                        "primary-dim": "#6f5fea",
                        "inverse-surface": "#fcf8fe",
                        "surface-container-low": "#131317",
                        "surface-container-lowest": "#000000",
                        "secondary-fixed": "#5af9f3",
                        "primary-fixed": "#9e93ff",
                        "on-secondary": "#005c59",
                        "tertiary": "#ffe089",
                        "surface-dim": "#0e0e12",
                        "on-secondary-container": "#dafffc",
                        "tertiary-container": "#ffcf2a",
                        "surface-container-highest": "#25252b",
                        "on-primary-fixed": "#000000",
                        "on-surface-variant": "#acaab0",
                        "secondary-container": "#006a67",
                        "on-surface": "#fcf8fe",
                        "error": "#ff6e84",
                        "surface-bright": "#2c2b32",
                        "on-primary": "#27009a",
                        "surface-tint": "#aca3ff",
                        "on-secondary-fixed": "#004746",
                        "error-container": "#a70138",
                        "on-primary-fixed-variant": "#250094",
                        "on-secondary-fixed-variant": "#006764",
                        "on-tertiary-fixed": "#433400",
                        "inverse-on-surface": "#555459",
                        "surface-container": "#19191e",
                        "on-error-container": "#ffb2b9",
                        "tertiary-fixed": "#ffcf2a",
                        "surface": "#0e0e12",
                        "on-tertiary-container": "#5a4700",
                        "surface-container-high": "#1f1f24",
                        "on-tertiary-fixed-variant": "#655000",
                        "error-dim": "#d73357",
                        "outline": "#76757a",
                        "on-error": "#490013",
                        "outline-variant": "#48474c",
                        "primary-fixed-dim": "#8f83ff",
                        "secondary-fixed-dim": "#46eae5",
                        "surface-variant": "#25252b",
                        "background": "#0e0e12"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-secondary {
            box-shadow: 0 0 40px rgba(90, 249, 243, 0.1);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen">
<!-- TopNavBar Suppression (Focused Session) -->
<!-- The navigation is suppressed per the "Destination Rule" for focused task environments -->
<main class="max-w-7xl mx-auto px-6 py-12 lg:py-24 grid lg:grid-cols-12 gap-12 items-center min-h-screen">
<!-- Left Column: The Study HUD -->
<section class="lg:col-span-7 flex flex-col space-y-10">
<header class="space-y-4">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full border border-outline-variant/15">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Live Session</span>
</div>
<div class="flex items-end gap-4">
<h2 class="font-headline text-2xl font-bold text-on-surface">Math</h2>
<span class="font-label text-sm text-on-surface-variant pb-1">Differential Equations</span>
</div>
</header>
<!-- Large HH:MM:SS Timer -->
<div class="relative">
<div class="font-headline text-8xl md:text-[10rem] font-bold tracking-tighter text-secondary leading-none select-none filter drop-shadow-[0_0_15px_rgba(90,249,243,0.3)]">
                    01:42:05
                </div>
<!-- live coin counter -->
<div class="mt-4 inline-flex items-center gap-3 bg-surface-container px-6 py-3 rounded-xl border border-outline-variant/15 glow-secondary">
<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
<span class="font-headline text-xl font-medium">+12 coins so far</span>
</div>
</div>
<!-- Focus Score & Progress -->
<div class="space-y-4 max-w-md">
<div class="flex justify-between items-end">
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Focus Score</span>
<span class="font-headline text-3xl font-bold text-on-background">87%</span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full relative" style="width: 87%">
<div class="absolute right-0 top-0 h-full w-2 bg-white blur-[2px]"></div>
</div>
</div>
<p class="text-sm text-on-surface-variant italic">Maintain focus to multiply your EduCoin earn rate.</p>
</div>
<!-- Stop Session Button -->
<div class="pt-6">
<button class="group relative inline-flex items-center gap-3 px-8 py-4 bg-error-container text-on-error-container rounded-lg font-headline font-bold text-lg active:scale-95 transition-all">
<span class="material-symbols-outlined">stop_circle</span>
                    Stop Session
                </button>
</div>
</section>
<!-- Right Column: Monitoring & Environment -->
<section class="lg:col-span-5 flex flex-col gap-6">
<!-- Camera Feed Widget -->
<div class="relative aspect-[4/3] bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/15 shadow-2xl">
<!-- Camera Feed Simulation -->
<img class="w-full h-full object-cover opacity-60 grayscale-[0.3]" data-alt="Candid POV of a student at a desk with laptop, warm ambient lighting, high tech dashboard interface overlay, cinematic look" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJHnovCcqdj7159i0QAAytNPa-3KiYK0LNtEnj6Fi_JE4zekx-1CC_18H32xUsvuk7WjiUvG1yVQ2jXZ8Fof5eANPBeawE1qBGllBe-6eB1egqrXWT2QI-QqORaPCCDRZO_6_ntd3kMMqgG7rlBgF5gkyyMMl1mmavMRStrO2YtxljDEtsO8QRsbgt5Zbq8Xz-n_0MZO-vm_yPYIaMaDqK7dIfOndLfrcCnKdkW5ELeQCQP5OIdqeC5ogP5Sxrm2Y2MyUxpUVFYg"/>
<!-- Overlay Elements -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/80 to-transparent"></div>
<!-- Face Detected Dot -->
<div class="absolute top-4 left-4 flex items-center gap-2 px-3 py-1.5 bg-surface-container-highest/90 backdrop-blur-md rounded-full border border-white/10">
<span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]"></span>
<span class="font-label text-[10px] uppercase font-bold tracking-tighter">Face Detected</span>
</div>
<!-- Privacy Badge -->
<div class="absolute bottom-4 right-4 flex items-center gap-2 px-3 py-1.5 bg-primary/20 backdrop-blur-md rounded-full border border-primary/30">
<span class="material-symbols-outlined text-[14px] text-primary">encrypted</span>
<span class="font-label text-[10px] uppercase font-bold tracking-tighter text-primary">Local Only</span>
</div>
<!-- Focus HUD Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-48 h-48 border border-secondary/20 rounded-full flex items-center justify-center">
<div class="w-40 h-40 border border-secondary/10 rounded-full"></div>
</div>
</div>
</div>
<!-- Mini Focus Tracker (Secondary) -->
<div class="bg-surface-container rounded-xl p-6 border border-outline-variant/15">
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline font-bold text-on-surface">Attention Pulse</h3>
<span class="material-symbols-outlined text-secondary">insights</span>
</div>
<div class="flex gap-1 items-end h-16">
<div class="flex-1 bg-secondary/20 rounded-t-sm h-[60%]"></div>
<div class="flex-1 bg-secondary/30 rounded-t-sm h-[80%]"></div>
<div class="flex-1 bg-secondary/20 rounded-t-sm h-[40%]"></div>
<div class="flex-1 bg-secondary/40 rounded-t-sm h-[90%]"></div>
<div class="flex-1 bg-secondary/60 rounded-t-sm h-[70%]"></div>
<div class="flex-1 bg-secondary/80 rounded-t-sm h-[95%]"></div>
<div class="flex-1 bg-secondary rounded-t-sm h-[85%]"></div>
</div>
</div>
<!-- Intentional Asymmetry: Achievement Teaser -->
<div class="relative bg-gradient-to-br from-tertiary-container/10 to-transparent rounded-xl p-6 border border-tertiary-container/10 overflow-hidden">
<div class="relative z-10 space-y-2">
<span class="font-label text-[10px] uppercase tracking-widest text-tertiary">Milestone Progress</span>
<p class="font-headline font-medium text-sm">18 minutes to 'Deep Work' badge</p>
</div>
<span class="material-symbols-outlined absolute -right-4 -bottom-4 text-7xl text-tertiary/10 rotate-12" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
</section>
</main>
<!-- SideNavBar Suppression (Focused Session) -->
<!-- The navigation is suppressed per the "Destination Rule" to minimize distractions during study -->
<!-- Achievement Orb (Background Decor) -->
<div class="fixed -bottom-32 -left-32 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -top-32 -right-32 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
